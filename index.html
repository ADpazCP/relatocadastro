<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relatório de Membros - ADpaz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }
        .header-title {
            color: #4CAF50;
            font-weight: 800;
        }
        /* Estilização da Foto Quadrada Arredondada */
        .photo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto;
            overflow: hidden;
            border: 3px solid #f1f5f9;
        }
        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .reg-number {
            position: absolute;
            top: 15px;
            right: 20px;
            font-weight: 800;
            color: #4CAF50;
            font-size: 1.1rem;
        }
        .member-function {
            font-size: 0.9rem;
            font-weight: 700;
            color: #4CAF50;
            text-transform: uppercase;
        }
        .info-label {
            font-size: 0.65rem;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
            display: block;
        }
        .info-value {
            font-size: 0.85rem;
            font-weight: 600;
            color: #334155;
        }
        .history-box {
            background-color: #f8fafc;
            font-size: 0.75rem;
            color: #64748b;
        }
        /* Ajuste para filtros no mobile */
        @media (max-width: 576px) {
            .btn-group-mobile {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="text-center mb-4">
        <h1 class="header-title">ADpaz Cidade Praia</h1>
        <p class="text-muted">Relatório de Membros da Congregação</p>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-4">
            <div class="row g-3">
                <div class="col-md-4 col-sm-6">
                    <label class="info-label mb-1">Mês Aniversário</label>
                    <select id="filterMonth" class="form-select">
                        <option value="">Todos</option>
                        <option value="1">Janeiro</option><option value="2">Fevereiro</option><option value="3">Março</option>
                        <option value="4">Abril</option><option value="5">Maio</option><option value="6">Junho</option>
                        <option value="7">Julho</option><option value="8">Agosto</option><option value="9">Setembro</option>
                        <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
                    </select>
                </div>
                <div class="col-md-4 col-sm-6">
                    <label class="info-label mb-1">Mês Casamento</label>
                    <select id="filterWeddingMonth" class="form-select">
                        <option value="">Todos</option>
                        <option value="1">Janeiro</option><option value="2">Fevereiro</option><option value="3">Março</option>
                        <option value="4">Abril</option><option value="5">Maio</option><option value="6">Junho</option>
                        <option value="7">Julho</option><option value="8">Agosto</option><option value="9">Setembro</option>
                        <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
                    </select>
                </div>
                <div class="col-md-4 col-sm-6">
                    <label class="info-label mb-1">Função</label>
                    <select id="filterFuncao" class="form-select"><option value="">Todas</option></select>
                </div>
                <div class="col-md-6 col-sm-6">
                    <label class="info-label mb-1">Cargo</label>
                    <select id="filterCargo" class="form-select"><option value="">Todos</option></select>
                </div>
                <div class="col-md-6 col-sm-12">
                    <label class="info-label mb-1">Situação</label>
                    <select id="filterSituacao" class="form-select"><option value="">Todas</option></select>
                </div>
            </div>
            <div class="row mt-4 btn-group-mobile">
                <div class="col-md-8">
                    <button id="filterButton" class="btn btn-success w-100 fw-bold">Aplicar Filtros</button>
                </div>
                <div class="col-md-4">
                    <button id="resetButton" class="btn btn-secondary w-100 fw-bold">Limpar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="statusMsg" class="text-center fw-bold text-success mb-3">Sincronizando dados...</div>

    <div id="membersGrid" class="row g-4"></div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzjVTT8rCWGU8WhzrnRjbiuI6iecUvJbh0iKjEZ_L0ps_j2b37cZKsZtxGrFp2WyLz6/exec';
    let members = [];

    async function loadData() {
        try {
            const resp = await fetch(scriptURL);
            members = await resp.json();
            document.getElementById('statusMsg').innerText = `Total: ${members.length} membros carregados`;
            setupFilters();
            render(members);
        } catch (e) {
            document.getElementById('statusMsg').innerText = "Erro ao carregar dados.";
        }
    }

    function setupFilters() {
        const getUniques = (k1, k2) => [...new Set(members.map(m => m[k1] || m[k2]))].filter(v => v).sort();
        const fill = (id, vals) => {
            const el = document.getElementById(id);
            vals.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v; opt.textContent = v;
                el.appendChild(opt);
            });
        };
        fill('filterFuncao', getUniques('funcao', 'funcaoeclesiastica'));
        fill('filterCargo', getUniques('cargo', 'cargo'));
        fill('filterSituacao', getUniques('outro', 'situacao'));
    }

    function render(data) {
        const grid = document.getElementById('membersGrid');
        grid.innerHTML = '';
        
        data.forEach(m => {
            const f_funcao = m.funcao || m.funcaoeclesiastica || 'Membro';
            const f_reg = String(m.registro || m.id || '0').padStart(3, '0');
            const ehCasado = String(m.estadocivil || '').toLowerCase().includes('casado') || String(m.estadocivil || '').toLowerCase().includes('uniao');
            const foto = m.foto ? (m.foto.startsWith('http') ? m.foto : `data:image/jpeg;base64,${m.foto}`) : 'https://via.placeholder.com/120?text=ADpaz';

            const cardCol = document.createElement('div');
            cardCol.className = 'col-12 col-md-6 col-lg-4';
            
            cardCol.innerHTML = `
                <div class="card h-100 shadow-sm border-0 position-relative">
                    <div class="reg-number">${f_reg}</div>
                    <div class="card-body text-center pt-4">
                        <div class="photo-container rounded-3 mb-3">
                            <img src="${foto}" alt="${m.nome}" loading="lazy">
                        </div>
                        <h5 class="card-title fw-800 mb-1 text-uppercase">${m.nome || 'Não informado'}</h5>
                        <p class="member-function mb-3">${f_funcao}</p>
                        
                        <div class="text-start border-top pt-3">
                            <div class="mb-2"><span class="info-label">Cargo</span><span class="info-value">${m.cargo || '---'}</span></div>
                            <div class="mb-2"><span class="info-label">Telefone</span><span class="info-value">${m.telefone || '---'}</span></div>
                            <div class="mb-2"><span class="info-label">Estado Civil</span><span class="info-value">${m.estadocivil || '---'}</span></div>
                            <div class="mb-2"><span class="info-label">Nascimento</span><span class="info-value">${m.nascimento ? new Date(m.nascimento).toLocaleDateString('pt-BR') : '---'}</span></div>
                            ${ehCasado ? `<div class="mb-2"><span class="info-label">Casamento</span><span class="info-value">${m.datacasamento ? new Date(m.datacasamento).toLocaleDateString('pt-BR') : '---'}</span></div>` : ''}
                            <div class="mb-2"><span class="info-label">Endereço</span><span class="info-value small text-muted">${m.endereco || '---'}</span></div>
                            <div class="mb-2"><span class="info-label">Situação</span><span class="badge bg-success-subtle text-success">${m.outro || m.situacao || 'Em Atividade'}</span></div>
                        </div>
                    </div>
                    <div class="card-footer history-box border-0 px-3 pb-3">
                        <strong>Histórico:</strong><br>
                        ${m.historico || '---'}
                    </div>
                </div>
            `;
            grid.appendChild(cardCol);
        });
    }

    document.getElementById('filterButton').onclick = () => {
        const mAniv = document.getElementById('filterMonth').value;
        const mWed = document.getElementById('filterWeddingMonth').value;
        const func = document.getElementById('filterFuncao').value;
        const cargo = document.getElementById('filterCargo').value;
        const sit = document.getElementById('filterSituacao').value;

        const filtered = members.filter(m => {
            const dAniv = m.nascimento ? new Date(m.nascimento) : null;
            const dWed = m.datacasamento ? new Date(m.datacasamento) : null;
            const mesAniv = dAniv ? dAniv.getUTCMonth() + 1 : null;
            const mesWed = dWed ? dWed.getUTCMonth() + 1 : null;
            
            return (!mAniv || mesAniv == mAniv) &&
                   (!mWed || mesWed == mWed) &&
                   (!func || (m.funcao || m.funcaoeclesiastica) === func) &&
                   (!cargo || m.cargo === cargo) &&
                   (!sit || (m.outro || m.situacao) === sit);
        });
        render(filtered);
        document.getElementById('statusMsg').innerText = `Resultados: ${filtered.length} encontrados`;
    };

    document.getElementById('resetButton').onclick = () => {
        document.querySelectorAll('select').forEach(s => s.value = '');
        render(members);
        document.getElementById('statusMsg').innerText = `Total: ${members.length} membros`;
    };

    loadData();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
