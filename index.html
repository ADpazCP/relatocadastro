<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ADpaz - Gestão de Membros</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4CAF50;
            --primary-hover: #43a047;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --border-color: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 20px;
            line-height: 1.5;
        }

        .header-section {
            max-width: 1400px;
            margin: 0 auto 30px;
            text-align: center;
        }

        .header-section h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 5px;
        }

        /* --- FILTROS --- */
        .filter-container {
            max-width: 1400px;
            margin: 0 auto 40px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
            border: 1px solid var(--border-color);
        }

        .filter-item { flex: 1 1 180px; display: flex; flex-direction: column; gap: 8px; }

        @media (max-width: 768px) {
            .filter-item { flex: 1 1 100%; }
            .btn-group { flex-direction: column; }
        }

        .filter-item label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .filter-item input, .filter-item select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .btn-group { display: flex; gap: 10px; flex: 1 1 100%; margin-top: 10px; }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        #filterButton { background: var(--primary); color: white; }
        #resetButton { background: #64748b; color: white; }

        /* --- GRID E CARDS --- */
        #membersGrid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .member-card {
            background: white;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card-top-accent { height: 6px; background: var(--primary); }

        .card-header { text-align: center; padding: 20px; }

        .photo-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #f1f5f9;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .photo-container img { width: 100%; height: 100%; object-fit: cover; }

        .member-name {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-main);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .member-sub {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
        }

        .info-body { padding: 15px 20px; flex-grow: 1; }

        .info-row {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #f8fafc;
            padding-bottom: 5px;
        }

        .info-label { font-size: 0.65rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
        .info-value { font-size: 0.9rem; font-weight: 600; color: #334155; }

        .card-footer {
            background: #f8fafc;
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
        }

        .history-text { font-size: 0.8rem; color: var(--text-muted); font-style: italic; }

        .status-badge {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 700;
            background: #e8f5e9;
            color: #2e7d32;
        }
    </style>
</head>
<body>

<div class="header-section">
    <h1>ADpaz Cidade Praia</h1>
    <p>Relatório Consolidado de Membros</p>
</div>

<div class="filter-container">
    <div class="filter-item">
        <label>Buscar por CPF</label>
        <input type="text" id="searchCpf" placeholder="000.000.000-00">
    </div>
    <div class="filter-item">
        <label>Mês Aniversário</label>
        <select id="filterMonth">
            <option value="">Todos</option>
            <option value="1">Janeiro</option><option value="2">Fevereiro</option><option value="3">Março</option>
            <option value="4">Abril</option><option value="5">Maio</option><option value="6">Junho</option>
            <option value="7">Julho</option><option value="8">Agosto</option><option value="9">Setembro</option>
            <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
        </select>
    </div>
    <div class="filter-item">
        <label>Função</label>
        <select id="filterFuncao"><option value="">Todas</option></select>
    </div>
    <div class="filter-item">
        <label>Cargo</label>
        <select id="filterCargo"><option value="">Todos</option></select>
    </div>
    <div class="filter-item">
        <label>Situação</label>
        <select id="filterSituacao">
            <option value="">Todas</option>
            <option value="Em Atividade">Em Atividade</option>
            <option value="Inativo">Inativo</option>
        </select>
    </div>
    <div class="btn-group">
        <button id="filterButton">Aplicar Filtros</button>
        <button id="resetButton">Limpar Tudo</button>
    </div>
</div>

<div id="memberCountDisplay" style="text-align:center; font-weight:800; color:var(--text-muted); margin-bottom:20px;"></div>
<div id="loadingMessage" style="text-align:center; padding:40px; font-weight:600; color:var(--primary);">Sincronizando dados...</div>
<div id="membersGrid"></div>

<script>
    const scriptURL_GET = 'https://script.google.com/macros/s/AKfycbyNNbsOdiqyJlYcPoGX0n0NgAImJKVj8dotNg2pUCvFQRLVVv8DTdykkEDcVMu8JngV/exec';
    let allMembersData = [];

    async function fetchMembersData() {
        try {
            const response = await fetch(scriptURL_GET);
            allMembersData = await response.json();
            populateFilters();
            applyFilters();
            document.getElementById('loadingMessage').style.display = 'none';
        } catch (e) {
            document.getElementById('loadingMessage').innerText = "Erro ao conectar com a base de dados.";
        }
    }

    function populateFilters() {
        const getUnique = (key) => [...new Set(allMembersData.map(m => m[key]))].filter(v => v).sort();
        const fill = (id, list) => {
            const el = document.getElementById(id);
            list.forEach(v => el.innerHTML += `<option value="${v}">${v}</option>`);
        };
        fill('filterFuncao', getUnique('funcao'));
        fill('filterCargo', getUnique('cargo'));
    }

    function createMemberCard(member) {
        const card = document.createElement('div');
        card.classList.add('member-card');
        
        const dateFmt = (d) => d ? new Date(d).toLocaleDateString('pt-BR') : '---';
        const photo = member.foto ? (member.foto.length > 100 ? `data:image/jpeg;base64,${member.foto}` : member.foto) : 'https://via.placeholder.com/150?text=Sem+Foto';
        
        const civil = String(member.estadocivil || '').toLowerCase();
        const mostrarCasamento = civil.includes('casado') || civil.includes('uniao');

        card.innerHTML = `
            <div class="card-top-accent"></div>
            <div class="card-header">
                <div class="photo-container"><img src="${photo}"></div>
                <h2 class="member-name">${member.nome || 'MEMBRO'}</h2>
                <div class="member-sub">${member.funcao || 'Membro'}</div>
            </div>
            <div class="info-body">
                <div class="info-row"><span class="info-label">Cargo/Ministério</span><span class="info-value">${member.cargo || '---'}</span></div>
                <div class="info-row"><span class="info-label">CPF</span><span class="info-value">${member.cpf || '---'}</span></div>
                <div class="info-row"><span class="info-label">Nascimento</span><span class="info-value">${dateFmt(member.nascimento)}</span></div>
                <div class="info-row"><span class="info-label">Telefone</span><span class="info-value">${member.telefone || '---'}</span></div>
                <div class="info-row"><span class="info-label">Estado Civil</span><span class="info-value">${member.estadocivil || '---'}</span></div>
                ${mostrarCasamento ? `<div class="info-row"><span class="info-label">Data Casamento</span><span class="info-value">${dateFmt(member.datacasamento)}</span></div>` : ''}
                <div class="info-row"><span class="info-label">Situação</span><div><span class="status-badge">${member.outro || 'Em Atividade'}</span></div></div>
                <div class="info-row"><span class="info-label">Endereço</span><span class="info-value" style="font-size:0.8rem">${member.endereco || '---'}</span></div>
            </div>
            <div class="card-footer">
                <span class="info-label">Histórico Eclesiástico</span>
                <p class="history-text">${member.historico || 'Sem registros históricos.'}</p>
            </div>
        `;
        return card;
    }

    function applyFilters() {
        const cpf = document.getElementById('searchCpf').value.toLowerCase();
        const mes = document.getElementById('filterMonth').value;
        const func = document.getElementById('filterFuncao').value;
        const cargo = document.getElementById('filterCargo').value;
        const situacao = document.getElementById('filterSituacao').value;

        const filtered = allMembersData.filter(m => {
            const mDate = m.nascimento ? new Date(m.nascimento) : null;
            return (!cpf || (m.cpf && m.cpf.includes(cpf))) &&
                   (!mes || (mDate && (mDate.getUTCMonth() + 1).toString() === mes)) &&
                   (!func || m.funcao === func) &&
                   (!cargo || m.cargo === cargo) &&
                   (!situacao || m.outro === situacao);
        });

        const grid = document.getElementById('membersGrid');
        grid.innerHTML = '';
        filtered.forEach(m => grid.appendChild(createMemberCard(m)));
        document.getElementById('memberCountDisplay').textContent = `Membros encontrados: ${filtered.length}`;
    }

    document.getElementById('filterButton').addEventListener('click', applyFilters);
    document.getElementById('resetButton').addEventListener('click', () => {
        document.querySelectorAll('input, select').forEach(i => i.value = '');
        applyFilters();
    });

    window.onload = fetchMembersData;
</script>
</body>
</html>
